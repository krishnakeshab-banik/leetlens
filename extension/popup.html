<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeetCode Tracker</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #f97316;
    --accent2: #fbbf24;
    --text: #e6edf3;
    --muted: #8b949e;
    --easy: #22c55e;
    --medium: #f59e0b;
    --hard: #ef4444;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 380px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .header-text h1 { font-size: 14px; font-weight: 600; }
  .header-text p { font-size: 11px; color: var(--muted); }
  .header-spacer { flex: 1; }
  .header-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
  }
  .header-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .now-box {
    margin: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
  }
  .now-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
  .now-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .now-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .timer { font-size: 22px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .diff-badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: .05em;
  }
  .diff-Easy   { background: #14532d; color: var(--easy); }
  .diff-Medium { background: #451a03; color: var(--medium); }
  .diff-Hard   { background: #450a0a; color: var(--hard); }
  .diff-Unknown { background: #1e293b; color: var(--muted); }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .status-badge.solved {
    background: rgba(34, 197, 94, .2);
    color: var(--easy);
  }

  .status-badge.pending {
    background: rgba(249, 115, 22, .2);
    color: var(--accent);
  }

  .stars-row { display: flex; gap: 4px; align-items: center; margin-top: 8px; }
  .stars-row span { font-size: 11px; color: var(--muted); margin-right: 2px; }
  .star { font-size: 18px; cursor: pointer; transition: transform .15s; line-height: 1; }
  .star:hover { transform: scale(1.25); }
  .star.lit { color: var(--accent2); }
  .star.dim { color: var(--border); }

  .section-head {
    padding: 6px 12px 4px;
    font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 4px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .see-all {
    font-size: 10px; color: var(--accent); cursor: pointer; text-decoration: none;
    background: none; border: none; padding: 0;
  }

  .list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 4px; }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .rank { font-size: 11px; color: var(--muted); width: 16px; text-align: right; flex-shrink: 0; }
  .item-title { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-status { font-size: 11px; font-weight: 600; color: var(--accent); }
  .item-stars { font-size: 10px; white-space: nowrap; }
  .item-time { font-size: 12px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; white-space: nowrap; }

  .empty {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">📊</div>
  <div class="header-text">
    <h1>LeetCode Tracker</h1>
    <p>Real-time problem tracking</p>
  </div>
  <div class="header-spacer"></div>
  <button class="header-btn" id="openDashboard">Dashboard</button>
</div>

<div class="now-box">
  <div class="now-label">Currently Solving</div>
  <div class="now-title" id="nowTitle">—</div>
  <div class="now-row">
    <div class="timer" id="nowTimer">—</div>
    <span class="diff-badge diff-Unknown" id="nowDiff">—</span>
    <div id="nowStatus"></div>
  </div>
  <div class="stars-row" id="nowStars"><span>Rate:</span></div>
</div>

<div class="section-head">Recent Problems</div>
<div class="list" id="recList">
  <div class="empty">Loading...</div>
</div>

<script src="popup.js"></script>

</body>
</html>
</html>
