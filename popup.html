<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeetLens</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    :root {
      --bg: #0b0b0c;
      --surface: rgba(20, 20, 22, 0.65);
      --border: rgba(63, 63, 70, 0.2);
      --border-hover: rgba(255, 161, 22, 0.25);
      --accent: #ffa116;
      --text: #e5e1e4;
      --muted: #8b949e;
      --easy: #00a572;
      --medium: #fba315;
      --hard: #ffb4ab;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    .header {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .header-actions .header-btn {
      flex: 1;
      min-width: 0;
      text-align: center;
      padding: 8px 10px;
    }

    .header-actions .header-btn-primary {
      background: var(--accent);
      color: #0b0b0c;
      border-color: var(--accent);
      font-weight: 700;
    }

    .header-actions .header-btn-primary:hover {
      opacity: 0.9;
      background: var(--accent);
      color: #0b0b0c;
    }

    .header-actions .header-btn-ghost {
      flex: 0 0 100%;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 9px;
      padding: 4px 0;
      text-transform: none;
      letter-spacing: 0;
    }

    .header-actions .header-btn-ghost:hover {
      color: var(--accent);
      background: transparent;
      border: none;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      color: #0b0b0c;
      font-weight: bold;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .header-spacer {
      flex: 1;
    }

    .header-btn {
      background: transparent;
      border: 1px solid rgba(161, 141, 122, 0.3);
      color: #d9c3ad;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .header-btn:hover {
      border-color: #ffc78b;
      color: #0b0b0c;
      background-color: #ffc78b;
    }

    .now-box {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .now-box:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 20px rgba(255, 161, 22, 0.04);
    }

    .now-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .now-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .now-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .timer {
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.02em;
      text-shadow: 0 0 10px rgba(255, 161, 22, 0.1);
    }

    .diff-badge,
    .status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .diff-Easy,
    .status-badge.solved {
      background: rgba(0, 165, 114, 0.08);
      color: var(--easy);
      border: 1px solid rgba(0, 165, 114, 0.18);
    }

    .diff-Medium {
      background: rgba(251, 163, 21, 0.08);
      color: var(--medium);
      border: 1px solid rgba(251, 163, 21, 0.18);
    }

    .diff-Hard {
      background: rgba(255, 180, 171, 0.08);
      color: var(--hard);
      border: 1px solid rgba(255, 180, 171, 0.18);
    }

    .diff-Unknown,
    .status-badge.pending {
      background: rgba(251, 163, 21, 0.08);
      color: var(--medium);
      border: 1px solid rgba(251, 163, 21, 0.18);
    }

    .stars-row {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .stars-row span {
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 4px;
    }

    .star {
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      line-height: 1;
      color: #2e2d31;
    }

    .star:hover,
    .star.lit {
      color: var(--medium);
      transform: scale(1.2);
    }

    .section-head {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .list-item:hover {
      border-color: rgba(255, 161, 22, 0.15);
      box-shadow: 0 4px 12px rgba(255, 161, 22, 0.02);
    }

    .rank {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      width: 18px;
      text-align: right;
      font-weight: 600;
    }

    .item-title {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .item-status {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
    }

    .item-stars {
      font-size: 11px;
      color: var(--medium);
      letter-spacing: 1px;
    }

    .item-time {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .cloud-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .cloud-bar:hover {
      border-color: var(--border-hover);
    }

    .cloud-bar.signed-in {
      border-color: rgba(0, 165, 114, 0.35);
      background: rgba(0, 165, 114, 0.06);
    }

    .cloud-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .cloud-bar.signed-in .cloud-dot {
      background: var(--easy);
      box-shadow: 0 0 8px rgba(0, 165, 114, 0.5);
    }

    .cloud-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0, 165, 114, 0.4);
      flex-shrink: 0;
    }

    .cloud-avatar-placeholder {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 161, 22, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .cloud-info {
      flex: 1;
      min-width: 0;
    }

    .cloud-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }

    .cloud-bar.signed-in .cloud-label { color: var(--easy); }

    .cloud-email {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cloud-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    .header-btn.signed-in {
      border-color: rgba(0, 165, 114, 0.4);
      color: var(--easy);
    }

    .header-btn.signed-in:hover {
      background: rgba(0, 165, 114, 0.12);
      color: var(--easy);
      border-color: var(--easy);
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">⏱</div>
    <div class="header-text">
      <h1>LeetLens</h1>
      <p>Track smarter. Revise better.</p>
    </div>
  </div>

  <div class="header-actions">
    <button class="header-btn header-btn-primary" id="openDashboard">Dashboard</button>
    <button class="header-btn" id="openSignIn">Sign In</button>
    <button class="header-btn header-btn-ghost" id="openDevelopers">Meet the Developers →</button>
  </div>

  <div class="cloud-bar" id="cloudAuthBar">
    <div class="cloud-dot"></div>
    <div class="cloud-info">
      <div class="cloud-label" id="cloudLabel">Cloud</div>
      <div class="cloud-email" id="cloudEmail">Checking account…</div>
      <div class="cloud-meta" id="cloudMeta"></div>
    </div>
  </div>

  <div class="now-box">
    <div class="now-label">Currently Solving</div>
    <div class="now-title" id="nowTitle">—</div>
    <div class="now-row">
      <div class="timer" id="nowTimer">—</div>
      <span class="diff-badge diff-Unknown" id="nowDiff">—</span>
      <div id="nowStatus"></div>
    </div>
    <div class="stars-row" id="nowStars"><span>Rate:</span></div>
  </div>

  <div class="section-head">Recent Problems</div>
  <div class="list" id="recList">
    <div class="empty">Loading...</div>
  </div>

  <script src="popup.js"></script>

</body>

</html>
